ticker: "PETR4.SA"
data:
  start_date: "2018-01-01"
  end_date: "2025-12-31"
  train_split: 0.8
  validation_split: 0.1
  test_split: 0.1

features:
  target_column: "Close"
  sequence_length: 60
  prediction_horizon: 5
  technical_indicators:
    - sma_20
    - sma_50
    - ema_12
    - ema_26
    - rsi_14
    - macd
    - macd_signal
    - bollinger_upper
    - bollinger_lower
    - volume_sma_20
  scaling: "minmax"  # minmax ou standard

model:
  input_size: null  # Calculado dinamicamente a partir das features
  hidden_size: 128
  num_layers: 2
  dropout: 0.2
  bidirectional: false
  output_size: 1

training:
  batch_size: 32
  epochs: 100
  learning_rate: 0.001
  weight_decay: 0.0001
  scheduler: "reduce_on_plateau"
  scheduler_patience: 10
  scheduler_factor: 0.5
  early_stopping_patience: 15
  gradient_clip_value: 1.0

mlflow:
  experiment_name: "datathon-petr4"
  model_name: "lstm-petr4"
  tags:
    model_type: "regression"
    framework: "pytorch"
    owner: "grupo-16"
    phase: "datathon-fase05"
    risk_level: "medium"
    ticker: "PETR4.SA"
